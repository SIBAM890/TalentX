version: '3.8'

services:
  talentx-api:
    build: .
    container_name: talentx-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  talentx-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=http://talentx-api:8000
    container_name: talentx-frontend
    ports:
      - "80:80"
    depends_on:
      - talentx-api
    restart: unless-stopped
